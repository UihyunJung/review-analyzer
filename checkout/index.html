<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>Place Review Analyzer — Upgrade to Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #1a1a1a;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
    .plans { display: flex; gap: 12px; margin-bottom: 24px; }
    .plan {
      flex: 1;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .plan.selected { border-color: #667eea; background: #667eea08; }
    .plan-price { font-size: 24px; font-weight: 700; color: #667eea; }
    .plan-period { font-size: 12px; color: #999; }
    .plan-save { font-size: 11px; color: #2e7d32; font-weight: 600; margin-top: 4px; }
    .error { color: #e53935; font-size: 13px; margin-bottom: 16px; display: none; }
    .success { color: #2e7d32; font-size: 16px; font-weight: 600; }
    .loading { color: #666; font-size: 14px; }
    #checkout-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    #checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #checkout-btn:hover:not(:disabled) { background: #5a6fd6; }
  </style>
</head>
<body>
  <div class="card">
    <div id="content-loading" class="loading">Verifying...</div>

    <div id="content-main" style="display:none">
      <h1>Upgrade to Pro</h1>
      <p class="subtitle">Unlimited analyses, trends, comparisons & more</p>

      <div class="plans">
        <div class="plan selected" id="plan-monthly" onclick="selectPlan('monthly')">
          <div class="plan-price">$3.99</div>
          <div class="plan-period">per month</div>
        </div>
        <div class="plan" id="plan-annual" onclick="selectPlan('annual')">
          <div class="plan-price">$29.99</div>
          <div class="plan-period">per year</div>
          <div class="plan-save">Save 37%</div>
        </div>
      </div>

      <div class="error" id="error-msg"></div>
      <button id="checkout-btn" onclick="startCheckout()">Subscribe Now</button>
    </div>

    <div id="content-success" style="display:none">
      <div class="success">Payment successful!</div>
      <p class="subtitle" style="margin-top:12px">You can close this tab and enjoy Pro features.</p>
    </div>

    <div id="content-error" style="display:none">
      <div class="error" style="display:block">Invalid or expired link. Please try again from the extension.</div>
    </div>
  </div>

  <!-- Paddle.js (CDN) -->
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
